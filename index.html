<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockefeller Center IT Asset Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --panel-bg: rgba(18, 22, 36, 0.92);
    --panel-bg-solid: #121624;
    --panel-text: #E8E8F0;
    --panel-text-dim: #8888A0;
    --accent: #00AAFF;
    --accent-hover: #33BBFF;
    --accent-dim: rgba(0,170,255,0.15);
    --danger: #FF4466;
    --danger-dim: rgba(255,68,102,0.15);
    --success: #44DD88;
    --success-dim: rgba(68,221,136,0.15);
    --warning: #FFAA33;
    --warning-dim: rgba(255,170,51,0.15);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.15);
    --radius: 8px;
    --radius-sm: 4px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --header-height: 50px;
    --strip-height: 88px;
    --panel-width: 420px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  html, body { height: 100%; overflow: hidden; font-family: var(--font); color: var(--panel-text); background: #0a0c14; }

  /* Map */
  #map { position: absolute; inset: 0; z-index: 0; }
  /* Push MapLibre controls below header */
  .maplibregl-ctrl-top-left { top: calc(var(--header-height) + 8px) !important; }
  .maplibregl-ctrl-bottom-left { bottom: calc(var(--strip-height) + 8px) !important; }

  /* Header */
  #header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); z-index: 100;
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    background: var(--panel-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
  }
  #header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  #header h1 span { color: var(--accent); }
  #header-controls { display: flex; gap: 8px; align-items: center; }
  #header-controls button {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--panel-text);
    padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  #header-controls button:hover { background: rgba(255,255,255,0.12); border-color: var(--border-light); }
  #header-controls button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Side Panel */
  #side-panel {
    position: fixed; top: var(--header-height); right: 0; width: var(--panel-width);
    height: calc(100vh - var(--header-height) - var(--strip-height)); z-index: 90;
    background: var(--panel-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--border);
    overflow-y: auto; overflow-x: hidden; transition: transform 0.3s ease;
  }
  #side-panel.collapsed { transform: translateX(100%); }
  #side-panel::-webkit-scrollbar { width: 6px; }
  #side-panel::-webkit-scrollbar-track { background: transparent; }
  #side-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  #panel-toggle {
    position: fixed; right: var(--panel-width); top: calc(var(--header-height) + 12px); z-index: 95;
    width: 28px; height: 48px; background: var(--panel-bg); border: 1px solid var(--border);
    border-right: none; border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    color: var(--panel-text-dim); cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: right 0.3s ease;
  }
  #panel-toggle.collapsed-toggle { right: 0; border-right: 1px solid var(--border); border-radius: var(--radius-sm); }

  /* Panel content */
  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-section-header {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--panel-text-dim); margin-bottom: 12px;
  }

  .floor-info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .floor-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 44px; height: 44px; padding: 0 8px; border-radius: var(--radius);
    background: var(--accent-dim); color: var(--accent); font-size: 18px; font-weight: 700;
  }
  .floor-name { font-size: 18px; font-weight: 600; }
  .floor-meta { font-size: 12px; color: var(--panel-text-dim); margin-top: 4px; }

  /* Tabs */
  .panel-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
  .panel-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer;
    color: var(--panel-text-dim); border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .panel-tab:hover { color: var(--panel-text); background: rgba(255,255,255,0.03); }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Cards */
  .card {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
  }
  .card:hover { background: rgba(255,255,255,0.06); border-color: var(--border-light); }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card-subtitle { font-size: 12px; color: var(--panel-text-dim); }
  .card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .card-detail { font-size: 11px; color: var(--panel-text-dim); margin-top: 2px; }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-active { background: var(--success-dim); color: var(--success); }
  .badge-inactive { background: rgba(255,255,255,0.06); color: var(--panel-text-dim); }
  .badge-maintenance { background: var(--warning-dim); color: var(--warning); }

  /* Type icons */
  .type-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: var(--radius-sm); font-size: 14px;
    background: rgba(255,255,255,0.06); margin-right: 8px; flex-shrink: 0;
  }

  /* Search + Filter bar */
  .search-bar {
    display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }
  .search-input {
    flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px; color: var(--panel-text);
    font-size: 12px; font-family: var(--font); outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--panel-text-dim); }
  .filter-select {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 8px; color: var(--panel-text);
    font-size: 11px; font-family: var(--font); outline: none; cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--panel-bg-solid); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
    font-family: var(--font); cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #ff5577; }
  .btn-ghost {
    background: transparent; color: var(--panel-text-dim); border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--panel-text); border-color: var(--border-light); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-icon {
    width: 28px; height: 28px; padding: 0; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--panel-text-dim); cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center; font-size: 13px;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.12); color: var(--panel-text); }
  .btn-icon.danger:hover { background: var(--danger-dim); color: var(--danger); }

  .fab {
    position: sticky; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; width: calc(100% - 32px); margin: 16px;
  }
  .fab .btn { width: 100%; padding: 10px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--panel-bg-solid); border: 1px solid var(--border-light);
    border-radius: var(--radius); width: 500px; max-height: 85vh; overflow-y: auto;
    box-shadow: var(--shadow); animation: slideUp 0.25s ease;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--panel-text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 10px; color: var(--panel-text);
    font-size: 13px; font-family: var(--font); outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select option { background: var(--panel-bg-solid); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-error { border-color: var(--danger) !important; }
  .form-error-text { font-size: 10px; color: var(--danger); margin-top: 2px; }
  .form-section-title { font-size: 12px; font-weight: 700; color: var(--accent); margin: 16px 0 10px; padding-top: 12px; border-top: 1px solid var(--border); }
  .form-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }

  /* Floor selector strip */
  #floor-strip {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--strip-height); z-index: 90;
    background: var(--panel-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* Building tabs row */
  #building-tabs {
    display: flex; align-items: center; gap: 4px; padding: 6px 12px 4px;
    overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--border);
  }
  #building-tabs::-webkit-scrollbar { height: 3px; }
  #building-tabs::-webkit-scrollbar-track { background: transparent; }
  #building-tabs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  .building-tab {
    flex-shrink: 0; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 10px;
    font-weight: 600; color: var(--panel-text-dim); cursor: pointer; white-space: nowrap;
    border: 1px solid transparent; transition: all 0.2s; user-select: none;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .building-tab:hover { background: rgba(255,255,255,0.06); color: var(--panel-text); }
  .building-tab.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Floor items row */
  #floor-items {
    display: flex; align-items: center; gap: 4px; padding: 4px 12px 6px;
    overflow-x: auto; flex: 1;
  }
  #floor-items::-webkit-scrollbar { height: 4px; }
  #floor-items::-webkit-scrollbar-track { background: transparent; }
  #floor-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .strip-item {
    flex-shrink: 0; padding: 6px 10px; border-radius: var(--radius-sm); font-size: 11px;
    font-weight: 600; color: var(--panel-text-dim); cursor: pointer; white-space: nowrap;
    border: 1px solid transparent; transition: all 0.2s; user-select: none;
  }
  .strip-item:hover { background: rgba(255,255,255,0.06); color: var(--panel-text); }
  .strip-item.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .strip-item.outdoor { color: var(--success); }
  .strip-item.outdoor.selected { background: var(--success-dim); border-color: var(--success); color: var(--success); }
  .strip-divider { flex-shrink: 0; width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* Welcome state */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 40px; text-align: center;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .welcome h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--panel-text); }
  .welcome p { font-size: 13px; color: var(--panel-text-dim); line-height: 1.5; }

  /* Asset detail expanded view */
  .asset-detail { padding: 12px; background: rgba(0,0,0,0.2); border-radius: 0 0 var(--radius) var(--radius); }
  .asset-detail-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .asset-detail-label { color: var(--panel-text-dim); }
  .asset-detail-value { color: var(--panel-text); font-family: var(--font-mono); font-size: 11px; }

  /* Confirm dialog */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-dialog {
    background: var(--panel-bg-solid); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 24px; width: 360px; text-align: center;
    box-shadow: var(--shadow);
  }
  .confirm-dialog h3 { font-size: 15px; margin-bottom: 8px; }
  .confirm-dialog p { font-size: 13px; color: var(--panel-text-dim); margin-bottom: 20px; }
  .confirm-dialog .btn-row { display: flex; gap: 8px; justify-content: center; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .stat-box {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px; text-align: center;
  }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--panel-text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Tenant card expanded */
  .tenant-expanded { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .tenant-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .tenant-label { color: var(--panel-text-dim); }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 150; background: var(--panel-bg-solid); border: 1px solid var(--border-light);
    border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; font-weight: 600;
    pointer-events: none; display: none; box-shadow: var(--shadow);
  }

  /* Responsive — Tablet (iPad etc.) */
  @media (max-width: 1100px) {
    :root { --panel-width: 360px; }
  }

  @media (max-width: 900px) {
    :root { --panel-width: 100vw; --strip-height: 80px; }

    #header h1 { font-size: 14px; }
    #header-controls button { padding: 6px 10px; font-size: 11px; }

    /* Panel slides over as overlay on tablet/mobile */
    #side-panel {
      top: var(--header-height); right: 0; width: var(--panel-width);
      height: calc(100vh - var(--header-height) - var(--strip-height));
      background: var(--panel-bg-solid); backdrop-filter: none;
      box-shadow: -4px 0 30px rgba(0,0,0,0.6);
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    #side-panel.panel-open { transform: translateX(0); }

    #panel-toggle {
      right: 0; border-right: 1px solid var(--border);
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }
    #panel-toggle.panel-visible { right: var(--panel-width); border-right: none; }

    .building-tab { padding: 5px 12px; font-size: 11px; }
    .strip-item { padding: 6px 12px; font-size: 12px; }

    /* Hide tooltip on touch devices */
    #tooltip { display: none !important; }

    .modal { width: 90vw; max-width: 460px; }
  }

  /* Phone portrait */
  @media (max-width: 560px) {
    :root { --header-height: 44px; --strip-height: 74px; }
    #header h1 { font-size: 12px; letter-spacing: 0; }
    #header h1 span { display: none; }
    #header h1::before { content: 'ROCKIT'; color: var(--accent); }
    #header-controls button { padding: 5px 8px; font-size: 10px; }
    .building-tab { padding: 4px 8px; font-size: 10px; }
    .strip-item { padding: 5px 8px; font-size: 11px; }
  }

  /* Touch-friendly: larger tap targets */
  @media (pointer: coarse) {
    .strip-item { padding: 8px 14px; min-height: 36px; }
    .building-tab { padding: 6px 14px; min-height: 32px; }
    .btn-icon { width: 36px; height: 36px; font-size: 16px; }
    .card { padding: 14px; }
    .panel-tab { padding: 12px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <h1><span>ROCKEFELLER CENTER</span> &nbsp;IT Asset Manager</h1>
  <div id="header-controls">
    <button id="btn-reset-view" title="Reset camera view">Reset View</button>
    <button id="btn-reset-data" title="Reset all data to defaults">Reset Data</button>
  </div>
</div>

<button id="panel-toggle">&#9664;</button>

<div id="side-panel"></div>

<div id="floor-strip"></div>

<div id="tooltip"></div>

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
<script type="module" src="./js/app.js"></script>

</body>
</html>
